<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HireLens</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      padding: 20px 24px;
    }
    h1 {
      color: #58a6ff;
      font-size: 1.6rem;
      margin-bottom: 6px;
    }
    .badges {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .badge {
      padding: 2px 10px;
      border-radius: 10px;
      font-size: .72rem;
      font-weight: 600;
    }
    /* 7.2 — renamed from .b-blue / .b-green */
    .badge-blue {
      background: #0c2d4a;
      color: #58a6ff;
    }
    .badge-green {
      background: #0a2d1a;
      color: #3fb950;
    }
    .cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }
    @media (max-width: 700px) {
      .cols { grid-template-columns: 1fr; }
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 5px;
      font-size: .88rem;
      color: #8b949e;
    }
    /* 7.7 — responsive: min-height + max-height instead of fixed height */
    textarea {
      width: 100%;
      min-height: 160px;
      max-height: 50vh;
      background: #161b22;
      color: #c9d1d9;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 10px;
      font-family: 'SFMono-Regular', Consolas, 'Courier New', monospace;
      font-size: .82rem;
      resize: vertical;
      line-height: 1.5;
      outline: none;
    }
    textarea:focus {
      border-color: #58a6ff;
    }
    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    select {
      background: #161b22;
      color: #c9d1d9;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 7px 12px;
      font-size: .88rem;
      cursor: pointer;
    }
    button {
      padding: 8px 20px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-size: .88rem;
      transition: opacity .15s;
    }
    button:hover:not(:disabled) {
      opacity: .8;
    }
    button:disabled {
      opacity: .4;
      cursor: not-allowed;
    }
    /* 7.2 — renamed from .btn-a / .btn-o / .btn-c */
    .btn-primary {
      background: #1f6feb;
      color: #fff;
    }
    .btn-success {
      background: #1a7f37;
      color: #fff;
    }
    .btn-secondary {
      background: #21262d;
      color: #c9d1d9;
      padding: 5px 12px;
      font-size: .8rem;
    }
    #status {
      font-size: .83rem;
      color: #8b949e;
    }
    /* 7.1 — inline error bar (replaces alert) */
    #error-bar {
      background: #2d1217;
      color: #f85149;
      border: 1px solid #f8514966;
      border-radius: 6px;
      padding: 8px 14px;
      font-size: .85rem;
      margin-bottom: 14px;
    }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #58a6ff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 14px;
    }
    .score-row {
      display: flex;
      align-items: flex-start;
      gap: 20px;
    }
    .circle {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      border: 4px solid;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.35rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .sec-title {
      font-size: .88rem;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 10px;
    }
    .chip {
      padding: 2px 9px;
      border-radius: 9px;
      font-size: .76rem;
      font-weight: 500;
    }
    /* 7.2 — renamed from .cg / .cr */
    .chip-green {
      background: #122d20;
      color: #3fb950;
    }
    .chip-red {
      background: #2d1217;
      color: #f85149;
    }
    .adapt-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    #cv-out {
      width: 100%;
      height: 280px;
      background: #0d1117;
      color: #c9d1d9;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 10px;
      font-family: 'SFMono-Regular', monospace;
      font-size: .82rem;
      resize: vertical;
    }
    hr {
      border: none;
      border-top: 1px solid #30363d;
      margin: 4px 0 14px;
    }
    .hidden { display: none; }
    /* 7.5 — empty state before first analysis */
    #empty-state {
      color: #8b949e;
      font-size: .9rem;
      padding: 24px 0;
      text-align: center;
    }
  </style>
</head>
<body>
<h1>🔍 HireLens</h1>
<div class="badges">
  <span class="badge badge-blue">Anti-Hallucination</span>
  <span class="badge badge-blue">Multi-Provider</span>
  <span class="badge badge-green">Offline Ready</span>
</div>

<div class="cols">
  <div>
    <label>📄 Votre CV</label>
    <textarea id="cv" placeholder="Collez votre CV ici (Markdown ou texte avec frontmatter YAML)…"></textarea>
  </div>
  <div>
    <label>💼 Offre d'emploi</label>
    <textarea id="job" placeholder="Collez l'offre d'emploi ici…"></textarea>
  </div>
</div>

<div class="controls">
  <select id="provider">
    <option value="offline">🔒 Offline</option>
    <option value="ollama">🦙 Ollama (local)</option>
    <option value="lmstudio">🎨 LM Studio (local)</option>
    <option value="openai">✨ OpenAI</option>
    <!-- 7.6 — Gemini is GUI-only, not available via web server -->
    <option disabled>🌟 Gemini (GUI uniquement)</option>
  </select>
  <button class="btn-primary" id="ba">🔍 Analyser</button>
  <button class="btn-success" id="bo">✨ Optimiser le CV</button>
  <span id="status"></span>
</div>

<!-- 7.1 — inline error bar -->
<div id="error-bar" class="hidden"></div>

<!-- 7.5 — shown before first analysis -->
<div id="empty-state">← Collez un CV et une offre pour démarrer</div>

<div id="audit-card" class="card hidden">
  <div class="score-row">
    <div class="circle" id="circle"></div>
    <div style="flex:1">
      <div id="match-pct" style="font-size:.82rem;color:#8b949e;margin-bottom:10px"></div>
      <div class="sec-title" style="color:#3fb950">✅ Compétences matchées</div>
      <div class="chips" id="matched"></div>
      <div class="sec-title" style="color:#f85149">❌ Compétences manquantes</div>
      <div class="chips" id="missing"></div>
    </div>
  </div>
  <details id="why-block" style="display:none;margin-top:12px">
    <summary style="cursor:pointer;font-size:.82rem;color:#8b949e">▸ Pourquoi ce score ?</summary>
    <table id="why-table" style="width:100%;border-collapse:collapse;margin-top:8px;font-size:.82rem"></table>
  </details>
</div>

<div id="adapt-card" class="card hidden">
  <hr>
  <div class="adapt-header">
    <span style="font-weight:600">✨ CV Optimisé</span>
    <div style="display:flex;gap:8px">
      <button class="btn-secondary" id="bcopy">📋 Copier</button>
      <!-- 7.4 — download .md -->
      <button class="btn-secondary" id="bdl">⬇️ Télécharger .md</button>
    </div>
  </div>
  <textarea id="cv-out" readonly></textarea>
</div>

<script>
// === Utilitaires ===

function scoreColor(s) {
  return s >= 75 ? '#3fb950' : s >= 50 ? '#e3b341' : '#f85149';
}

function noneLabel(txt) {
  return `<span style="color:#8b949e;font-size:.8rem">${txt}</span>`;
}

function chips(arr, cls) {
  return arr.length
    ? arr.map(s => `<span class="chip ${cls}">${s}</span>`).join('')
    : noneLabel('aucune');
}

function statusLabel(s) {
  if (s === 'Present') return { txt: '✅ présent', col: '#3fb950' };
  if (s === 'Missing') return { txt: '❌ manquant', col: '#f85149' };
  return { txt: '⚠ faible', col: '#e3b341' };
}

// 7.1 — inline error (replaces alert)
function showError(msg) {
  const bar = document.getElementById('error-bar');
  bar.textContent = '⚠ ' + msg;
  bar.classList.remove('hidden');
}

function clearError() {
  document.getElementById('error-bar').classList.add('hidden');
}

// === Rendu ===

function renderAudit(d) {
  const c = document.getElementById('circle');
  c.textContent = d.score;
  c.style.borderColor = scoreColor(d.score);
  c.style.color = scoreColor(d.score);

  document.getElementById('match-pct').textContent =
    (d.skill_match_ratio * 100).toFixed(0) + '% match';
  document.getElementById('matched').innerHTML = chips(d.matched_skills, 'chip-green');
  document.getElementById('missing').innerHTML = chips(d.missing_skills, 'chip-red');

  const wb = document.getElementById('why-block');
  const expl = d.explanations || [];
  if (expl.length > 0) {
    const rows = expl.map(r => {
      const { txt, col } = statusLabel(r.status);
      return `<tr><td style="padding:2px 8px 2px 0;color:#c9d1d9">${r.skill}</td>` +
        `<td style="color:${col}">${txt}</td>` +
        `<td style="color:#8b949e;padding-left:8px">${r.occurrences} occ.</td></tr>`;
    }).join('');
    document.getElementById('why-table').innerHTML = rows;
    wb.style.display = '';
  } else {
    wb.style.display = 'none';
  }

  // 7.5 — hide empty state once results appear
  document.getElementById('empty-state').classList.add('hidden');
  document.getElementById('audit-card').classList.remove('hidden');
}

function setLoading(on) {
  document.getElementById('ba').disabled = on;
  document.getElementById('bo').disabled = on;
  document.getElementById('status').innerHTML = on
    ? '<span class="spinner"></span>Traitement en cours…'
    : '';
}

// === API ===

function readInputs() {
  const cv = document.getElementById('cv').value.trim();
  const job = document.getElementById('job').value.trim();
  if (!cv || !job) {
    showError('Remplissez les deux champs.');
    return null;
  }
  clearError();
  return { cv, job, provider: document.getElementById('provider').value };
}

async function post(url, body) {
  const r = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  return r.json();
}

async function analyze() {
  const b = readInputs();
  if (!b) return;
  setLoading(true);
  document.getElementById('adapt-card').classList.add('hidden');
  try {
    const res = await post('/api/audit', b);
    if (!res.ok) { showError(res.error); return; }
    renderAudit(res.data);
  } catch (e) {
    showError('Erreur réseau : ' + e.message);
  } finally {
    setLoading(false);
  }
}

async function optimize() {
  const b = readInputs();
  if (!b) return;
  setLoading(true);
  try {
    const res = await post('/api/adapt', b);
    if (!res.ok) { showError(res.error); return; }
    renderAudit(res.data.audit);
    document.getElementById('cv-out').value = res.data.markdown;
    document.getElementById('adapt-card').classList.remove('hidden');
  } catch (e) {
    showError('Erreur réseau : ' + e.message);
  } finally {
    setLoading(false);
  }
}

// === Événements ===

// 7.3 — persist CV and job offer across page reloads
document.getElementById('cv').addEventListener('input', e => {
  localStorage.setItem('hirelens_cv', e.target.value);
});
document.getElementById('job').addEventListener('input', e => {
  localStorage.setItem('hirelens_job', e.target.value);
});

// Restore from localStorage on load
(function restoreFromStorage() {
  const cv = localStorage.getItem('hirelens_cv');
  const job = localStorage.getItem('hirelens_job');
  if (cv) document.getElementById('cv').value = cv;
  if (job) document.getElementById('job').value = job;
})();

document.getElementById('ba').addEventListener('click', analyze);
document.getElementById('bo').addEventListener('click', optimize);

// 7.4 — copy to clipboard
document.getElementById('bcopy').addEventListener('click', () => {
  navigator.clipboard.writeText(document.getElementById('cv-out').value).then(() => {
    const b = document.getElementById('bcopy');
    b.textContent = '✅ Copié';
    setTimeout(() => { b.textContent = '📋 Copier'; }, 1500);
  });
});

// 7.4 — download as .md file
document.getElementById('bdl').addEventListener('click', () => {
  const text = document.getElementById('cv-out').value;
  const blob = new Blob([text], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'cv-optimized.md';
  a.click();
  URL.revokeObjectURL(url);
});
</script>
</body>
</html>
