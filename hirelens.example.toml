# hirelens.example.toml — annotated configuration reference
# Copy to hirelens.toml (project root) or ~/.config/hirelens/config.toml
# All fields are optional; sensible defaults apply when absent.
# Env vars always take precedence over file values (see each section).
# Load a specific file: HIRELENS_CONFIG=/path/to/config.toml hirelens ...

# Default LLM provider for CLI commands.
# Values: "openai" | "ollama" | "lmstudio"
# Note: "gemini" is GUI-only (OAuth2 PKCE via ⚙ Settings panel).
# Override per-command with --provider.
provider = "ollama"

# Privacy-first mode: when true, skip all LLM calls.
# Uses only the skills declared in the CV's frontmatter.
# Equivalent to --offline on the command line.
offline = false

# Enable JSON response caching keyed by input content + provider name.
# Speeds up repeated analyses of the same CV/job pair.
cache = true
cache_dir = ".cache"

# HTTP timeout for LLM providers (seconds). Raise for slow local models.
timeout_seconds = 60

# ── OpenAI ────────────────────────────────────────────────────────────────────
# Env var: OPENAI_API_KEY (preferred — never store secrets in checked-in files)
#          OPENAI_MODEL, OPENAI_BASE_URL
[openai]
# api_key = "sk-..."          # prefer env var OPENAI_API_KEY
model = "gpt-4o-mini"
base_url = "https://api.openai.com/v1"

# ── Ollama (local) ────────────────────────────────────────────────────────────
# Env var: OLLAMA_BASE_URL, OLLAMA_MODEL
# Pull a model first: ollama pull llama3.1
[ollama]
model = "llama3.1"
base_url = "http://localhost:11434"

# ── LM Studio (local) ─────────────────────────────────────────────────────────
# Env var: LMSTUDIO_BASE_URL, LMSTUDIO_MODEL
# Start the LM Studio local server before running hirelens.
[lmstudio]
model = "local-model"
base_url = "http://localhost:1234/v1"
